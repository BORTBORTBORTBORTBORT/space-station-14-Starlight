# Base

- type: entity
  abstract: true
  parent: BaseObjective
  id: BaseHighlanderObjective
  components:
  - type: Objective
    difficulty: 1.5
    issuer: objective-issuer-Highlander
  - type: RoleRequirement
    roles:
    - HighlanderRole


#Kill

- type: entity
  parent: [BaseVampireObjective, BaseKillObjective]
  id: VampireKillRandomPersonObjective
  description: Do it however you like, just make sure they don't make it to centcomm.
  components:
  - type: Objective
    difficulty: 1.75
    unique: false
  - type: TargetObjective
    title: objective-condition-kill-person-title
  - type: PickRandomPerson


#Escape

- type: entity
  parent: [BaseHighlanderObjective, BaseSurviveObjective]
  id: HighlanderSurviveObjective
  name: Survive
  description: I must survive no matter what.
  components:
  - type: Objective
    icon:
      sprite: Interface/Actions/actions_Highlander.rsi
      state: survive_icon
